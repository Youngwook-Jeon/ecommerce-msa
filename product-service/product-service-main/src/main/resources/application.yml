server:
  port: 9002

issuer-uri: http://localhost:8080/realms/Ecomart

product-service:
  product-topic-name: product
  storefront-cache:
    enabled: true
    key-prefix: "ecomart:product:storefront:"
    ttl-seconds: 900
    ttl-jitter-seconds: 20
    lock-ttl-seconds: 10
    lock-wait-retries: 5
    lock-wait-millis: 50
  catalog-events:
    relay: debezium
    topic-name: product.catalog.changed
    outbox-poll-interval-ms: 2000
    outbox-batch-size: 50
  public-search:
    # NAME_BRAND (default, combined name+brand pg_trgm GIN) | NAME_DESCRIPTION_LEGACY (benchmark / legacy)
    keyword-search:
      strategy: NAME_BRAND

schema:
  name: product

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ecodb_product?currentSchema=${schema.name}&binaryTransfer=true&reWriteBatchedInserts=true
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    schemas: ${schema.name}

  jpa:
    open-in-view: false
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ${schema.name}
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${issuer-uri}

  sql:
    init:
      platform: init
      mode: never

  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 2s
      timeout: 1s

kafka-config:
  bootstrap-servers: localhost:19092, localhost:29092, localhost:39092
  schema-registry-url-key: schema.registry.url
  schema-registry-url: http://localhost:8081
  num-of-partitions: 3
  replication-factor: 3

kafka-producer-config:
  key-serializer-class: org.apache.kafka.common.serialization.StringSerializer
  value-serializer-class: io.confluent.kafka.serializers.KafkaAvroSerializer
  compression-type: snappy
  acks: all
  batch-size: 16384
  batch-size-boost-factor: 100
  linger-ms: 5
  request-timeout-ms: 60000
  retry-count: 5

r2:
  enabled: true
  endpoint: ${R2_ENDPOINT}
  region: auto
  access-key-id: ${R2_ACCESS_KEY_ID}
  secret-access-key: ${R2_SECRET_ACCESS_KEY}
  bucket: ${R2_BUCKET}
  public-base-url: ${R2_PUBLIC_BASE_URL}

logging:
  level:
    org:
      springframework:
        security: INFO
      hibernate:
        engine:
          jdbc:
            batch:
              internal: DEBUG