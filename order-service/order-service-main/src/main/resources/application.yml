server:
  port: 9003

issuer-uri: http://localhost:8080/realms/Ecomart

schema:
  name: order

order-service:
  guest-cart:
    enabled: true
    key-prefix: "ecomart:order:cart:guest:"
    ttl-seconds: 2592000
    cookie:
      name: guest_cart_id
      path: /
      max-age-seconds: 2592000
  product-catalog:
    base-url: ${PRODUCT_SERVICE_URL:http://localhost:9002}
    connect-timeout-ms: 2000
    read-timeout-ms: 3000
    
resilience4j:
  circuitbreaker:
    instances:
      productCatalog:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 3s
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        # 4xx (our request is wrong) must not count toward the failure rate.
        ignore-exceptions:
          - com.project.young.orderservice.application.port.output.ProductCatalogClientException
  timelimiter:
    instances:
      productCatalog:
        timeout-duration: 4s
        cancel-running-future: true

spring:
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 2s
      timeout: 1s
  datasource:
    url: jdbc:postgresql://localhost:5432/ecodb_order?currentSchema=${schema.name}&binaryTransfer=true&reWriteBatchedInserts=true
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    schemas: ${schema.name}

  jpa:
    open-in-view: false
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ${schema.name}
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${issuer-uri}

  sql:
    init:
      platform: init
      mode: never

logging:
  level:
    org:
      springframework:
        security: INFO
      hibernate:
        engine:
          jdbc:
            batch:
              internal: DEBUG
